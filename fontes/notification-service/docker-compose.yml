version: "3.8"

networks:
  notification_service_net:
    driver: bridge

volumes:
  notification_service_pg_data:
  notification_service_mysql_data:

services:
  # ------------------------
  #  Notification Service Database
  # ------------------------
  notification_service_postgres:
    image: postgres:17
    container_name: notification_service_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notification_service
    ports:
      - "5453:5432"
    volumes:
      - notification_service_pg_data:/var/lib/postgresql/data
    networks:
      - notification_service_net

  # ------------------------
  #  LocalStack (SQS)
  # ------------------------
  localstack:
    container_name: localstack_main
    image: localstack/localstack
    ports:
      - "127.0.0.1:4566:4566"
      - "127.0.0.1:4510-4559:4510-4559"
    environment:
      - SERVICES=sqs
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "./localstack:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./init-sqs.sh:/etc/localstack/init/ready.d/init-sqs.sh"
    networks:
      - notification_service_net

  notification_app:
    build: .
    container_name: notification_service_app
    ports:
      - "8080:8080"
    environment:
      - APP_ENVIRONMENT=dev
      - DATABASE_URL=postgres://postgres:postgres@notification_service_postgres:5432/notification_service
      - SQS_ENDPOINT=http://localstack:4566
    depends_on:
      - localstack
      - notification_service_postgres
    networks:
      - notification_service_net

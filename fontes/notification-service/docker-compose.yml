version: "3.8"

networks:
  notification_service_net:
    driver: bridge

volumes:
  notification_service_pg_data:
  notification_service_mysql_data:

services:
  # ------------------------
  #  Notification Service Database
  # ------------------------
  notification-service-db:
    image: postgres:alpine
    container_name: notification-service-db
    restart: always
    environment:
      POSTGRES_DB: notification_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    networks:
      - notification_service_net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
  # ------------------------
  #  LocalStack (SQS)
  # ------------------------

  localstack:
    container_name: localstack
    # logging: driver: none  <-- Sugiro comentar isso para ver se o script roda!
    image: localstack/localstack:stable
    environment:
      - REGION=us-east-1
      - LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT=1 # Adicione esta linha
    ports:
      - "127.0.0.1:4566:4566"
      - "127.0.0.1:4510-4559:4510-4559"
    networks:
      - notification_service_net
    volumes:
      - "${TEMPDIR:-/var/lib/localstack}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./init-sqs.sh:/etc/localstack/init/ready.d/setup.sh"

  notification_app:
    build: .
    container_name: notification_service_app
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgres://postgres:postgres@notification-service-db:5432/notification_service
      - SQS_ENDPOINT_URL=http://localstack:4566
      - QUEUE_URL=http://localstack:4566/000000000000/notification_send_email.fifo
    depends_on:
      notification-service-db:
        condition: service_healthy
      localstack:
        condition: service_started
    entrypoint: ["./scripts/entrypoint.sh"]
    networks:
      - notification_service_net

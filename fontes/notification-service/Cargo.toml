[package]
name = "notification-service"
version = "0.1.0"
edition = "2024"

[dependencies]
actix-web = "4.12.1"
async-trait = "0.1.89"
chrono = {version = "0.4.43", features = ["serde"]}
chrono-tz = "0.10.4"
config = "0.15.19"
dotenv = "0.15.0"
env = "1.0.1"
env_logger = "0.11.8"
futures-util = "0.3.31"
jsonwebtoken = { version = "10.3.0", features = ["rust_crypto"] }
lettre = "0.11.19"
log = "0.4.29"
rand = "0.10.0"
reqwest = { version = "0.13.1", features = ["blocking", "json", "native-tls", "query"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sha2 = "0.10.9"
sha3 = "0.10.8"
sqlx = { version = "0.8.6", features= [
"runtime-tokio-rustls",
"postgres",
"uuid",
"macros",
"chrono"
]}
thiserror = "2.0.18"
tokio = { version = "1.49.0", features = ["full"] }
tokio-cron-scheduler = "0.15.1"
tracing = "0.1.44"
tracing-actix-web = "0.7.21"
tracing-subscriber = { version = "0.3.22", features = ["env-filter", "chrono"] }
unicode-normalization = "0.1.25"
uuid = { version = "1.20.0", features = ["v4", "serde"] }

[profile.release]
opt-level = 3          # Otimização máxima
lto = true             # Link Time Optimization (binário menor e mais rápido)
codegen-units = 1      # Melhora a otimização, mas aumenta o tempo de compilação
panic = 'abort'        # Remove o overhead de stack unwinding

[lints.clippy]
pedantic = "deny"
nursery = "deny"
